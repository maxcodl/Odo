name: Build Beta APK
on:
  push:
    branches:
      - "beta"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build beta APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle.kts') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/odo-release.jks

      - name: Build release APK (signed)
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/app/odo-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          TAG="beta-${{ github.sha }}"
          cp app/build/outputs/apk/release/*.apk Odo-${TAG}-release.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Odo-beta-release
          path: Odo-*-release.apk

      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          name: Odo Beta ${{ github.ref_name }} (${{ github.sha }})
          tag_name: "beta-${{ github.sha }}"
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            Odo-*-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
